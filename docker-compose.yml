services:
  # ============ 使用示例：选择一个 provider 取消注释 ============

  # 腾讯云 DNSPod
  ddns6-tencent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command:
      - run
      - tencent
      - --secret-id=${TENCENT_SECRET_ID}
      - --secret-key=${TENCENT_SECRET_KEY}
      - --domain=${DOMAIN}
      - --subdomain=${SUBDOMAIN:-@}
      - --interval=${INTERVAL:-5m}
      - --debug=${DEBUG:-false}

