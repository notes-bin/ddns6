services:
  # ============================================================
  # Docker Compose 部署 DDNS6
  #
  # 使用方式：
  #   1. 复制 .env.example 为 .env，填入你的配置
  #   2. 取消注释所需的 provider 服务
  #   3. docker compose up -d
  #
  # 注意：Netlink 需要主机的网络命名空间，所以必须设置
  # network_mode: host。这仅在 Linux 上有效。
  # ============================================================

  # ---------- 配置文件模式（推荐） ----------
  # 将 ~/.ddns6/config.yaml 挂载到容器内，无需在命令行输入参数
  # ddns6-config:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   network_mode: host
  #   restart: always
  #   volumes:
  #     - ~/.ddns6:/root/.ddns6:ro
  #   command:
  #     - run

  # ---------- 命令行模式（选择一个取消注释） ----------

  # 腾讯云 DNSPod (API v3)
  ddns6-tencent:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: always
    command:
      - run
      - tencent
      - --secret-id=${TENCENT_SECRET_ID}
      - --secret-key=${TENCENT_SECRET_KEY}
      - --domain=${DOMAIN}
      - --subdomain=${SUBDOMAIN:-@}
      - --interface=${INTERFACE:-}
      - --ttl=${TTL:-600}
      - --interval=${INTERVAL:-5m}
      - --debug

